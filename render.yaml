# Render Blueprint — declarative deploy for the openreversefeed Django demo.
# Connect this repo as a Blueprint in the Render dashboard (New → Blueprint)
# and Render reads this file to provision the web service + Postgres + the
# nightly AMFI cron. ~5 minutes from connect to public URL.

services:
  # ─── Web service (Django + gunicorn) ────────────────────────────────────
  - type: web
    name: openreversefeed
    runtime: python
    plan: free                 # free tier — sleeps after 15 min idle, fine for team testing
    region: singapore          # closest Render region to India
    branch: main               # auto-deploy on push to main
    rootDir: .
    buildCommand: |
      pip install -r requirements.txt
      # Library schema first — accounts/folios/transactions/schemes etc.
      alembic upgrade head
      # Then Django's own auth/sessions/messages tables in the same Postgres
      cd examples/django_reference
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
    startCommand: |
      cd examples/django_reference && \
        gunicorn reference_app.wsgi:application \
          --bind 0.0.0.0:$PORT \
          --workers 2 \
          --threads 4 \
          --timeout 60 \
          --access-logfile - \
          --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true       # Render generates a 64-char random string once
      # Both DATABASE_URL and OFR_DATABASE_URL point to the same Render Postgres.
      # Django uses DATABASE_URL for its own auth/session tables. The library
      # (openreversefeed) uses OFR_DATABASE_URL for accounts/folios/transactions.
      # They share one DB but use different table names, no collision.
      - key: DATABASE_URL          # Django's default DB — replaces sqlite
        fromDatabase:
          name: openreversefeed-db
          property: connectionString
      - key: OFR_DATABASE_URL      # library DB
        fromDatabase:
          name: openreversefeed-db
          property: connectionString
      - key: OFR_DATA_DIR          # ephemeral — Render free tier has no disk
        value: /tmp/ofr
      - key: WEB_CONCURRENCY
        value: "2"
    # NOTE: Render free tier doesn't support persistent disks. State files
    # (calendar_events.json, crm_leads.json, client_insights_cache.json,
    # research_rules.json, .nav_cache/) live on /tmp and are wiped on each
    # cold-start (after ~15 min idle). Ingested portfolio data is safe — that
    # lives in Postgres and survives restarts.
    #
    # To enable persistence: change `plan: free` to `plan: starter` ($7/mo)
    # and add back the disk block:
    #   disk:
    #     name: ofr-data
    #     mountPath: /data
    #     sizeGB: 1
    # then change OFR_DATA_DIR to /data.
    # Healthcheck hits the lightest endpoint (root → dashboard redirect).
    # Don't use /clients/arn/ — that page does heavy work (NAV fetches,
    # XIRR computation across the book) and would tank the healthcheck on
    # cold start.
    healthCheckPath: /

  # ─── (No separate cron job needed for AMFI NAV.) ─────────────────────
  # Render's free cron type doesn't support persistent disks, so a cron-driven
  # refresh would write to ephemeral storage and the web service wouldn't see
  # it. Instead, the web service lazy-loads NAVAll.txt on the first request of
  # each day (~3 s extra for the first user; cached for everyone else).
  #
  # When you upgrade to Render Pro, switch this to a `worker` with a shared
  # disk mount, schedule via APScheduler / Celery beat at 16:00 UTC.

# ─── Postgres database (free tier, 90-day expiry — recreate after that) ─
databases:
  - name: openreversefeed-db
    plan: free
    region: singapore
    databaseName: ofr
    user: ofr
